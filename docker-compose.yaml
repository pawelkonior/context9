services:
    qdrant:
      image: qdrant/qdrant:latest
      restart: unless-stopped
      ports:
        - "6333:6333"
        - "6334:6334"
      environment:
        QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-dev-qdrant-key}
      volumes:
        - qdrant_data:/qdrant/storage
    embedder:
      build: .
      restart: unless-stopped
      command: ["context9-embedder"]
      ports:
        - "8500:8500"
      environment:
        EMBEDDER_API_KEY: ${EMBEDDER_API_KEY:-dev-embedder-key}
        EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}

volumes:
  qdrant_data:
